services:
  web:
    build:
      context: .
      target: production
    volumes:
      - static_volume:/past_due_app/staticfiles
      # - media_volume:/past_due_app/mediafiles
    expose:
      - "8000"
    # environment:
      # - DEBUG=0
      # - SECRET_KEY=twoj_bardzo_tajny_klucz_produkcyjny_django_6
      # - DATABASE_URL=postgres://django_prod_user:super_secure_password_django6@db:5432/django_prod_db
      # - ALLOWED_HOSTS=127.0.0.1
    # depends_on:
      # - db
    restart: always

  nginx:
    image: nginx:1.30.2-trixie
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/past_due_app/staticfiles
      # - media_volume:/past_due_app/mediafiles
    depends_on:
      - web
    restart: always

volumes:
  static_volume:
  # media_volume:
