services:
  celery_worker:
    build:
      context: .
      target: production
    # image: python:3.12.13-slim-trixie
    # volumes:
      # - .:/app
    # working_dir: /app
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
    command: celery -A celery_app worker --loglevel=info
    depends_on:
      rabbitmq:
        condition: service_healthy

  celery_beat:
    build:
      context: .
      target: production
    # image: python:3.12.13-slim-trixie
    # volumes:
      # - .:/app
    # working_dir: /app
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
    command: celery -A celery_app beat --loglevel=info
    depends_on:
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:4.3.1-management
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:18.4-trixie
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql
    restart: unless-stopped
  
  web:
    build:
      context: .
      target: production
    volumes:
      - static_volume:/past_due_app/staticfiles
      # - media_volume:/past_due_app/mediafiles
    expose:
      - "8000"
    environment:
      - DJANGO_SETTINGS_MODULE=past_due_project.settings.prod
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      # - DEBUG=0
      # - SECRET_KEY=twoj_bardzo_tajny_klucz_produkcyjny_django_6
      # - DATABASE_URL=postgres://django_prod_user:super_secure_password_django6@db:5432/django_prod_db
      # - ALLOWED_HOSTS=127.0.0.1
    depends_on:
      - db
      - rabbitmq
    command: >
      sh -c "python manage.py migrate && gunicorn past_due_project.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    restart: always

  nginx:
    image: nginx:1.30.2-trixie
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/past_due_app/staticfiles
      # - media_volume:/past_due_app/mediafiles
    depends_on:
      - web
    restart: always

volumes:
  static_volume:
  # media_volume:
  postgres_data_prod:
